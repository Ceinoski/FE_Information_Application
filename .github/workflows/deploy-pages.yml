name: Deploy FE Feed to GitHub Pages

# Publishes only the ./app folder (the PWA) to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the app/ folder as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
